# ====================================================================
# MANAGER SETTINGS
# ====================================================================
[manager]
ratio          = [ 1, 3, 4 ] # Width distribution: Parent, Current, Preview
sort_by        = "natural"
sort_sensitive = false
sort_reverse   = false
sort_dir_first = true
show_hidden    = false
show_symlink   = true

# ====================================================================
# PREVIEW SETTINGS (Optimized for your graphics-patched st)
# ====================================================================
[preview]
tab_size        = 2
max_width       = 600
max_height      = 900
image_delay     = 30       # Smooths rendering when scrolling fast
image_filter    = "triangle"
image_quality   = 75
sixel_fraction  = 15
wrap            = "yes"    # Wrap text previews

# ====================================================================
# OPENER DEFINITIONS
# ====================================================================
[opener]
edit = [
	{ run = '${EDITOR:-nvim} "$@"', block = true, for = "unix" },
]
play = [
	{ run = 'mpv "$@"', orphan = true, for = "unix" },
]
open = [
	{ run = 'xdg-open "$@"', desc = "Open" },
]

# ====================================================================
# FILE OPENING RULES
# ====================================================================
[open]
rules = [
	{ mime = "text/*", use = "edit" },
	{ mime = "video/*", use = "play" },
	{ mime = "image/*", use = "open" },
	{ mime = "application/pdf", use = "open" },
]

# ====================================================================
# PLUGIN / PREVIEWER ASSIGNMENTS
# ====================================================================
[plugin]
previewers = [
	# Images
	{ mime = "image/*", run = "image" },
	
	# Videos (Requires ffmpegthumbnailer)
	{ mime = "video/*", run = "video" },
	
	# PDFs (Requires poppler/pdftoppm)
	{ mime = "application/pdf", run = "pdf" },
	
	# Text files
	{ mime = "text/*", run = "code" },
	{ mime = "*/javascript", run = "code" },
	{ mime = "*/json", run = "code" },
	
	# Fallback for archives / binary data
	{ mime = "application/zip", run = "archive" },
	{ mime = "application/x-tar", run = "archive" },
	{ mime = "application/x-bzip2", run = "archive" },
	{ mime = "application/x-gzip", run = "archive" },
	{ url = "*", run = "binary" },
]