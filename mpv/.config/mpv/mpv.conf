##################
# Video Settings #
##################
# Use the high-performance GPU video output driver
vo=gpu
# Use the modern high-quality profile
profile=fast

# Explicitly force Intel VA-API hardware decoding
hwdec=auto
# Tell mpv to use the newer Intel Media driver backend (iHD)
vaapi-device=/dev/dri/renderD128

##################
# dwm / X11 Sync #
##################
# Match video frames to your monitor's exact refresh rate to stop stuttering
video-sync=display-resample
interpolation=yes
tscale=oversample

##################
# Cache Tuning   #
##################
# Disable pre-caching for local storage to prevent lag spikes during seeks
cache=yes
demuxer-max-bytes=500MiB
demuxer-max-back-bytes=100MiB

##################
# UI & Behavior  #
##################
# Keep the player open after the video finishes
keep-open=yes
# Start in the center of your screen
geometry=50%:50%
# Automatically scale the window size to fit comfortably on screen
autofit-large=70%x70%

ytdl-format="bestvideo[height<=720][fps<=30]+bestaudio/best"