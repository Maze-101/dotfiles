# ==========================================
# FONTS
# ==========================================
font_family      Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        10.0

# Disable font ligatures if you want raw text speed, 
# or keep 'never' commented out to enjoy them.
# disable_ligatures never

# ==========================================
# WINDOW & PADDING
# ==========================================
# Add a bit of breathing room inside the terminal window
window_padding_width 6

# Hide the window decorations (title bar/borders). 
# dwm handles its own borders; we don't want Kitty adding them too.
hide_window_decorations yes

# ==========================================
# PERFORMANCE & BELL
# ==========================================
# Match this to your monitor's refresh rate (e.g., 60, 144)
repaint_delay    8
input_delay      3
sync_to_monitor  yes

# Disable the annoying system beep sound
enable_audio_bell no

# ==========================================
# DWM COMPATIBILITY (DISABLE KITTY WINDOWS)
# ==========================================
# Kitty has built-in tabs and windows. In dwm, this is redundant 
# and confusing. We unbind them so they don't conflict with dwm keys.
clear_all_shortcuts yes

# Re-enable standard copy/paste shortcuts
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard

# Enable scrolling shortcuts (since we cleared all shortcuts above)
map ctrl+shift+up        scroll_line_up
map ctrl+shift+down      scroll_line_down

# Zoom in (Increase font size)
map ctrl+shift+equal     change_font_size all +2.0
map ctrl+shift+plus      change_font_size all +2.0

# Zoom out (Decrease font size)
map ctrl+shift+minus     change_font_size all -2.0

# Reset zoom (Back to default font size)
map ctrl+shift+backspace change_font_size all 0